<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academic Portal - Events</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      body {
        font-family: 'Poppins', sans-serif;
        background-color: #f5f7fa;
      }
      .courses-box3 {
        background: #fff;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        margin-bottom: 30px;
        overflow: hidden;
        transition: transform 0.3s ease;
      }
      .courses-box3:hover {
        transform: translateY(-5px);
      }
      .single-item-wrapper {
        display: flex;
        flex-wrap: wrap;
      }
      .courses-img-wrapper {
        flex: 0 0 300px;
        position: relative;
        overflow: hidden;
      }
      .courses-img-wrapper img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        transition: transform 0.3s;
      }
      .courses-img-wrapper:hover img {
        transform: scale(1.05);
      }
      .courses-img-wrapper a {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        background: #002147;
        color: #fff;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.3s;
      }
      .courses-img-wrapper:hover a {
        transform: translate(-50%, -50%) scale(1);
      }
      .courses-content-wrapper {
        flex: 1;
        padding: 25px;
      }
      .item-title {
        font-size: 1.35rem;
        font-weight: 600;
        margin-bottom: 10px;
      }
      .item-title a {
        color: #002147;
        text-decoration: none;
      }
      .item-title a:hover {
        color: #f39c12;
      }
      .item-content {
        color: #666;
        margin-bottom: 20px;
        line-height: 1.6;
      }
      .courses-info {
        display: flex;
        gap: 30px;
        list-style: none;
        padding: 0;
        margin: 0 0 20px 0;
      }
      .courses-info li {
        font-size: 0.8rem;
        color: #888;
        text-transform: uppercase;
        font-weight: 500;
      }
      .courses-info li span {
        display: block;
        font-size: 0.9rem;
        color: #002147;
        font-weight: 600;
        margin-top: 5px;
      }
      .courses-fee {
        background: #002147;
        color: #fff;
        padding: 10px 25px;
        border-radius: 30px;
        font-weight: 500;
        display: inline-block;
        text-decoration: none;
        transition: 0.3s;
        cursor: pointer;
      }
      .courses-fee:hover {
        background: #f39c12;
        color: #fff;
      }
      .btn-add {
        background: #28a745;
        color: #fff;
        padding: 10px 25px;
        border-radius: 30px;
        text-decoration: none;
        margin-bottom: 20px;
        display: inline-block;
      }
      .btn-add:hover {
        background: #218838;
        color: #fff;
      }
      .btn-edit {
        background: #ffc107;
        color: #333;
        padding: 5px 15px;
        border-radius: 20px;
        text-decoration: none;
        font-size: 0.8rem;
        margin-right: 5px;
      }
      .btn-delete {
        background: #dc3545;
        color: #fff;
        padding: 5px 15px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
        font-size: 0.8rem;
      }
      .btn-delete:hover {
        background: #c82333;
      }
      .btn-view {
        background: #17a2b8;
        color: #fff;
        padding: 5px 15px;
        border-radius: 20px;
        text-decoration: none;
        font-size: 0.8rem;
        margin-right: 5px;
      }
      .container-custom {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      h1, h2 {
        font-weight: 600;
        color: #002147;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  * {
    font-family: 'Poppins', sans-serif;
  }
  body {
    background-color: #f5f7fa;
    margin: 0;
    padding: 0;
  }
</style>
